Guestbtn1.addEventListener('click', function() {
    const newItemText = GetGuest1.value.trim();

    if (isLocked) {
        alert("Room is locked. No more changes allowed.");
        return;
    }

    // Validate input
    if (newItemText === '') {
        alert('Please enter an Guest Name.');
        return;
    }

    // If list is over 5
    if (Guestlist1.children.length >= 5) {
        alert('Only 5 guests can be checked in.');
        return;
    }

    // Create a new list item
    const li = document.createElement('li');
    li.textContent = newItemText;

    // Append the new item to the list
    Guestlist1.appendChild(li);

    addLog(`Added guest to room 1: ${newItemText}`);

    // Clear the input field
    GetGuest1.value = '';
    GetGuest1.focus();
});
GetGuest1.addEventListener('keypress', function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        Guestbtn1.click(); // simulate button press
    }
});
ReGuestbtn1.addEventListener('click', function() {
    const removeText = GetGuest1.value.trim();

    if (isLocked) {
        alert("Room is locked. No more changes allowed.");
        return;
    }

    if (removeText === '') {
        alert('Please enter a Guest to Remove.');
        return;
    }

    if (Guestlist1.children.length === 0) {
        alert('No Guests have checked into the room.');
        return;
    }

    let found = false;

    for (let li of Guestlist1.children) {
        if (li.textContent.toLowerCase() === removeText.toLowerCase()) {
            Guestlist1.removeChild(li);
            found = true;
            break;
        }
    }

    if (!found) {
        alert('Guest not found in the list.');
    }

    addLog(`Removed guest from room 1: ${removeText}`);

    GetGuest1.value = '';
    GetGuest1.focus();
});
ReallGuestsbtn1.addEventListener('click', function() {
    const removeText = GetGuest1.value.trim();

    if (isLocked) {
        alert("Room is locked. No more changes allowed.");
        return;
    }

    if (Guestlist1.children.length === 0) {
        alert('No Guests are checked into this room.');
        return;
    }

    Guestlist1.innerHTML = ''

    addLog(`Removed All Guests from Room 1`);

    GetGuest1.value = '';
    GetGuest1.focus();
});
LockGRbtn1.addEventListener('click', function() {
    isLocked = !isLocked; // toggle true/false
    

    if (isLocked) {
        LockGRbtn1.textContent = "Unlock Room";
        alert("Room 1 is now locked. No more changes allowed.");
        addLog("Room 1 has been Locked.");
    } else {
        LockGRbtn1.textContent = "Lock Room";
        alert("Room 1 is now unlocked. You may edit the guest list.");
        addLog("Room 1 has been unlocked.")
    }
});

function addLog(message) {
    const logList = document.getElementById('LogList');
    const li = document.createElement('li');

    const now = new Date();
    const date = now.toLocaleDateString();
    const time = now.toLocaleTimeString();

    li.textContent = `${message} — ${date} at ${time}`;
    logList.appendChild(li);
}
</script>
</body>
</html>
